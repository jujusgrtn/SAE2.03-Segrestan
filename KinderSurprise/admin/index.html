<!doctype html>
<html lang="fr">
  <head>
    <title>SAE2.03 ADMIN</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>
  <body>
    <section id="log"></section>

    <section id="content"></section>

    <script type="module">
      import { Log } from "./component/Log/script.js";
      import { NewMovie } from "./component/FormAddMovie/script.js";
      import { DataMovie } from "./data/dataMovie.js";
      import { DataProfile } from "./data/dataProfile.js";
      import { ProfileForm } from "./component/ProfileForm/script.js";

      window.C = {};

      C.handlerAddMovie = async function () {
        let form = document.querySelector(".addMovie__form");
        let formData = new FormData(form);
        let res = await DataMovie.addMovie(formData);
        V.renderLog(res);
      };

      C.start = function () {
        V.renderLog("Démarrage de l'application");
        let content = document.querySelector("#content");
        content.innerHTML = NewMovie.format("C.handlerAddMovie()") + ProfileForm.format();
      };

      C.handlerAddProfile = async function () {
        let form = document.querySelector(".profile__form-form");
        let formData = new FormData(form);
        let res = await DataProfile.addProfile(formData);
        V.renderLog(res);
      };

      window.V = {};

      V.renderLog = function (txt) {
        let content = document.querySelector("#log");
        content.innerHTML = Log.format(txt);
      };

      V.renderNewMovie = function (handler) {
        let content = document.querySelector("#content");
        let html = NewMovie.format(handler);
        console.log("Le code renvoie :" + html);
        if (content) {
          content.innerHTML = html;
        }
      };

      V.renderProfileForm = function () {
        let content = document.querySelector("#content");
        content.innerHTML = ProfileForm.format();
      };
      C.start();
    </script>
  </body>
</html>
