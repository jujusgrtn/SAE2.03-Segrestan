<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP de Justine</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>

  <body>

    <header id="header"></header>

    <section id="content" ></section>
  

    <script type="module">
      import {DataMovie} from "./data/dataMovie.js";
      import { NavBar } from "./component/NavBar/script.js";
      import { MovieList } from "./component/MovieList/script.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";
      import { Categories } from "./component/Categories/script.js";
      
      // Controleur
      // Rappel, écrire window.C plutôt que let C est nécessaire pour tester depuis la console du navigateur
      // Une fois l'application terminée, on pourrait remettre let C.
      window.C = {};

      C.handlerAbout = function () {
        alert(
          "Ceci est une base de projet pour la SAE2.03 édition 2025. Bonne chance !"
        );
      };

      C.start = async function () {
        const categories = await DataMovie.getAllCategories();
        let movies = await DataMovie.getAllMovies();
        V.renderNavBar("C.handlerAbout()", "C.handlerAccueil()", categories);
        V.renderMovieList(movies);
      };

      
      
      C.handlerAccueil = async function () {
        let movies = await DataMovie.getAllMovies();
        V.renderMovieList(movies);
      };

      C.handlerDetail = async function (id) {
        let movie = await DataMovie.requestMovieDetails(id);
        if (movie) {
          V.renderMovieDetail(movie);
        }
      };
      
      C.handlerFilterByCategory = async function (categoryId) {
        let movies = await DataMovie.getMoviesByCategory(categoryId);
        V.renderMovieList(movies);
      };
      

      // Vue (contient tout ce qui est relatif à l'affichage)
      window.V = {};

      /**
       * V.renderNavBar
       *
       * Cette fonction est responsable de l'affichage de la barre de navigation (NavBar).
       * Elle sélectionne l'élément HTML avec l'ID "header" et y insère le contenu
       * formaté par le composant NavBar.
       */
      V.renderNavBar = function (hAbout, hAccueil, categories) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(hAbout, hAccueil, categories);
      };
      
      V.renderMoviesByCategories = async function (categories) {
        let content = document.querySelector("#content");
        let html = await Categories.formatMany(categories, "C.handlerDetail");
        content.innerHTML = html;
      };

      V.renderMovieList = function (movies) {
        let content = document.querySelector("#content");
        let html = MovieList.formatMany(movies, "C.handlerDetail");
        content.innerHTML = html;
      };

      V.renderMovieDetail = function (movie) {
        let content = document.querySelector("#content");
        content.innerHTML = MovieDetail.format(movie, "C.handlerAccueil()");
      };



      C.start(); // Démarre l'application
    </script>
  </body>
</html>
